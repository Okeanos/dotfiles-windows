# yaml-language-server:$schema=https://json.schemastore.org/github-workflow.json
# https://docs.github.com/en/actions/writing-workflows
name: Verify

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      betterleaks:
        description: Run Betterleaks (Secret scanner)
        default: true
        type: boolean
      editorconfig:
        description: Run EditorConfig linter
        default: true
        type: boolean
      lychee:
        description: Run lychee (Broken link finder)
        default: false
        type: boolean
      markdownlint:
        description: Run Markdown linter
        default: true
        type: boolean
      powershell:
        description: Run PowerShell linter
        default: true
        type: boolean
      shellcheck:
        description: Run shellcheck (shell script linter)
        default: true
        type: boolean
      tombi:
        description: Run tombi (TOML linter)
        default: true
        type: boolean
      yamllint:
        description: Run yamllint (YAML linter)
        default: true
        type: boolean

# https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
permissions:
  contents: read

# Cancel duplicate runs for this workflow if they happen for the same commit
# Thus should help with duplicate runs caused by PRs, e.g. because of Renovate
# See https://github.com/orgs/community/discussions/181292 for limitations
# See https://github.com/orgs/community/discussions/57827 for workarounds for PR/Branch-Push duplication workarounds with external PRs
concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  is-valid-run:
    runs-on: ubuntu-slim
    outputs:
      check: ${{ steps.check-result.outputs.output }}
    steps:
      - name: Check for duplicate runs
        id: check-result
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_NAME: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_NAME: ${{ github.event.pull_request.base.repo.full_name }}
          PR_ACTION: ${{ github.event.pull_request.action }}
        run: |
          # assume this is a duplicate run
          result=false
          # run if not a pull-request
          if [[ "${EVENT_NAME}" != 'pull_request' ]]; then
            result=true
          elif [[ "${EVENT_NAME}" == 'pull_request' ]]; then
            # run if this PR was triggered from an external repo
            if [[ "${HEAD_NAME}" != "${BASE_NAME}" ]]; then
              result=true
            # run if this is a PR and marked as:
            elif [[ "${PR_ACTION}" == "ready_for_review" ]] || \
                  [[ "${PR_ACTION}" =~ ^(un)?labeled$ ]] || \
                  [[ "${PR_ACTION}" == "reopened" ]]; \
            then
              result=true
            fi
          fi
          echo "output=${result}" >> "$GITHUB_OUTPUT"
      - name: Test result
        run: |
          echo "result: '${{ steps.check-result.outputs.output }}'"

  betterleaks:
    needs: is-valid-run
    if: ${{ ((inputs.betterleaks || true) == true) && (needs.is-valid-run.outputs.check == 'true') }}
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Extract Tool Versions
        id: tool-versions
        run: |
          betterleaks_version=$(yq '.tools.betterleaks.version' .mise.toml)
          betterleaks_shasum=$(yq '.tools.betterleaks.platforms.linux-x64.checksum' .mise.toml | cut -d ':' -f2)
          echo "betterleaks_version=${betterleaks_version}" >> "$GITHUB_OUTPUT"
          echo "betterleaks_shasum=${betterleaks_shasum}" >> "$GITHUB_OUTPUT"
      - name: Install Betterleaks
        env:
          BETTERLEAKS_VERSION: ${{ steps.tool-versions.outputs.betterleaks_version }}
          BETTERLEAKS_SHASUM: ${{ steps.tool-versions.outputs.betterleaks_shasum }}
        run: |
          curl --fail --silent --show-error --location --output betterleaks.tar.gz \
            https://github.com/betterleaks/betterleaks/releases/download/v${BETTERLEAKS_VERSION}/betterleaks_${BETTERLEAKS_VERSION}_linux_x64.tar.gz
          echo "${BETTERLEAKS_SHASUM} betterleaks.tar.gz" | sha256sum --check
          tar -xzf betterleaks.tar.gz betterleaks
          ./betterleaks dir --verbose --redact .
  editorconfig:
    needs: is-valid-run
    if: ${{ ((inputs.editorconfig || true) == true) && (needs.is-valid-run.outputs.check == 'true') }}
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Extract Tool Versions
        id: tool-versions
        run: |
          ec_version=$(yq '.tools.editorconfig-checker.version' .mise.toml)
          ec_shasum=$(yq '.tools.editorconfig-checker.platforms.linux-x64.checksum' .mise.toml | cut -d ':' -f2)
          echo "ec_version=${ec_version}" >> "$GITHUB_OUTPUT"
          echo "ec_shasum=${ec_shasum}" >> "$GITHUB_OUTPUT"
      - name: Run EditorConfig Checker
        env:
          EDITORCONFIG_CHECKER_VERSION: ${{ steps.tool-versions.outputs.ec_version }}
          EDITORCONFIG_CHECKER_SHASUM: ${{ steps.tool-versions.outputs.ec_shasum }}
        run: |
          curl --fail --silent --show-error --location --output editorconfig.tar.gz \
            https://github.com/editorconfig-checker/editorconfig-checker/releases/download/v${EDITORCONFIG_CHECKER_VERSION}/ec-linux-amd64.tar.gz
          echo "${EDITORCONFIG_CHECKER_SHASUM} editorconfig.tar.gz" | sha256sum --check
          tar -xzf editorconfig.tar.gz bin/ec-linux-amd64
          ./bin/ec-linux-amd64 -f github-actions
  lychee:
    needs: is-valid-run
    if: ${{ ((inputs.lychee || false) == true) && (needs.is-valid-run.outputs.check == 'true') }}
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Extract Tool Versions
        id: tool-versions
        run: |
          lychee_version=$(yq '.tools.lychee.version' .mise.toml)
          echo "lychee_version=${lychee_version}" >> "$GITHUB_OUTPUT"
      - name: Restore lychee cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-
      - uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          fail: false
          failIfEmpty: false
          format: markdown
          jobSummary: true
          lycheeVersion: v${{ steps.tool-versions.outputs.lychee_version }}
          args: "--base . --cache --max-cache-age 21d ."
  markdownlint:
    needs: is-valid-run
    if: ${{ ((inputs.markdownlint || true) == true) && (needs.is-valid-run.outputs.check == 'true') }}
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
  powershell:
    needs: is-valid-run
    if: ${{ ((inputs.powershell || true) == true) && (needs.is-valid-run.outputs.check == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer -Path .\ -Settings PSGallery -Recurse
  shellcheck:
    needs: is-valid-run
    if: ${{ ((inputs.shellcheck || true) == true) && (needs.is-valid-run.outputs.check == 'true') }}
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Extract Tool Versions
        id: tool-versions
        run: |
          shellcheck_version=$(yq '.tools.shellcheck.version' .mise.toml)
          echo "shellcheck_version=${shellcheck_version}" >> "$GITHUB_OUTPUT"
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          version: v${{ steps.tool-versions.outputs.shellcheck_version }}
  tombi:
    needs: is-valid-run
    if: ${{ ((inputs.tombi || true) == true) && (needs.is-valid-run.outputs.check == 'true') }}
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Extract Tool Versions
        id: tool-versions
        run: |
          tombi_version=$(yq '.tools.tombi.version' .mise.toml)
          tombi_shasum=$(yq '.tools.tombi.platforms.linux-x64.checksum' .mise.toml | cut -d ':' -f2)
          echo "tombi_version=${tombi_version}" >> "$GITHUB_OUTPUT"
          echo "tombi_shasum=${tombi_shasum}" >> "$GITHUB_OUTPUT"
      - name: Install Tombi
        env:
          TOMBI_VERSION: ${{ steps.tool-versions.outputs.tombi_version }}
          TOMBI_SHASUM: ${{ steps.tool-versions.outputs.tombi_shasum }}
        run: |
          curl --fail --silent --show-error --location --output tombi.tar.gz \
            https://github.com/tombi-toml/tombi/releases/download/v${TOMBI_VERSION}/tombi-cli-${TOMBI_VERSION}-x86_64-unknown-linux-musl.tar.gz
          echo "${TOMBI_SHASUM} tombi.tar.gz" | sha256sum --check
          tar -xzf tombi.tar.gz tombi-cli-${TOMBI_VERSION}-x86_64-unknown-linux-musl/tombi
          ./tombi-cli-${TOMBI_VERSION}-x86_64-unknown-linux-musl/tombi lint
  yamllint:
    needs: is-valid-run
    if: ${{ ((inputs.yamllint || true) == true) && (needs.is-valid-run.outputs.check == 'true') }}
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Extract Tool Versions
        id: tool-versions
        run: |
          yamllint_version=$(yq '.tools.yamllint.version' .mise.toml)
          echo "yamllint_version=${yamllint_version}" >> "$GITHUB_OUTPUT"
      - name: Run yamllint
        env:
          YAMLLINT_VERSION: ${{ steps.tool-versions.outputs.yamllint_version }}
        run: |
          pip install yamllint=="${YAMLLINT_VERSION}"
          yamllint .
